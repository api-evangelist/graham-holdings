aid: graham-holdings
name: Graham Holdings
description: >-
  Graham Holdings (NYSE: GHC) is a diversified holding company with
  operations in education, television broadcasting, digital media,
  manufacturing, healthcare, automotive, restaurants, and custom framing.
  Principal subsidiaries include Kaplan (educational services), Graham
  Media Group and Social News Desk (broadcasting and social media tools),
  The Slate Group and Foreign Policy (digital publishing), Code3 and City
  Cast (digital marketing and local news), Hoover Treated Wood Products,
  Joyce/Dayton, Group Dekko, and Forney (manufacturing), Graham Healthcare
  Group (home health and hospice), Graham Automotive (dealerships), Clyde's
  Restaurant Group (including Old Ebbitt Grill), and Framebridge (online
  custom framing). No public developer APIs have been identified across the
  portfolio.
